# Daily research digest — game-dev-wiki (K115 federated install)
#
# Reference: @osint-wiki/scripts/daily_research_config.yaml
# Report: wiki/sweeps/YYYY-MM-DD-daily.md

loop:
  recency_window_days: 7
  max_results_per_query: 3

fetch:
  enabled: true
  max_downloads: 5
  fetch_likely: false
  max_results_per_paper_query: 5

active_topics:
  - "Godot 4 — RTS, grid building, isometric 2D, pathfinding tutorials"
  - "Castle sim / Stronghold-like design — economy, siege, wall building postmortems"
  - "Indie RTS scope — vertical slice discipline, solo dev timelines"
  - "Agent-assisted game dev — multi-agent codegen, Godot + LLM workflows"
  - "RTS networking — lockstep, deterministic simulation (research only until slice ships)"
  - "Game art pipeline — isometric tiles, sprite sheets (@image-gen-wiki cross-ref)"

paper_queries:
  - cluster: rts-ai-paper
    query: "research paper real-time strategy game AI pathfinding unit coordination"
    category: research paper

  - cluster: procedural-building-paper
    query: "research paper procedural building placement simulation game"
    category: research paper

queries:
  - cluster: godot-rts
    query: '"Godot 4" RTS OR "real-time strategy" OR grid building OR isometric tutorial'
    category: news

  - cluster: stronghold-castle-sim
    query: 'Stronghold castle simulation OR medieval city builder OR siege game design GDC'
    category: news

  - cluster: agent-game-dev
    query: 'LLM agent game development Godot OR multi-agent code generation indie game'
    category: news

  - cluster: godot-building-kit
    query: 'Godot building system grid placement open source github'
    category: news

monokern_pipeline:
  enabled: true
  cadence: weekly
  default_deliverable: none
  source_modules:
    - yt-dlp
    - inbox_pdf
    - web_url
  ingest_hook: "After weekly digest, one NotebookLM pass on top ROADMAP topic (engine eval or slice spec)"

social:
  manual_pass:
    - tool: opencli-reader
      prompt: "HN + Reddit gamedev for Godot RTS or castle builder headlines last 7d"

output:
  path_template: "wiki/sweeps/{date}-daily.md"
